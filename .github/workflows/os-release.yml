name: os-release

# Builds the Shape Rotator OS installers (DMG / NSIS exe / AppImage +
# deb) and publishes them to a GitHub Release. Triggered by pushing a
# v-prefixed tag, e.g. `git tag v0.1.0 && git push --tags`. The version in
# the tag must match `apps/os/package.json:version` (electron-builder
# reads from package.json, not the tag, but the tag is what triggers us).
#
# What ends up on the release:
#   ShapeRotatorOS-<v>-mac-arm64.dmg + .zip
#   ShapeRotatorOS-<v>-mac-x64.dmg + .zip
#   ShapeRotatorOS-<v>-win-x64.exe + .zip
#   ShapeRotatorOS-<v>-win-arm64.exe + .zip
#   ShapeRotatorOS-<v>-linux-x86_64.AppImage + .deb
#   ShapeRotatorOS-<v>-linux-arm64.AppImage + .deb
#   latest-mac.yml / latest.yml / latest-linux.yml  (electron-updater feed)
#
# macOS signing + notarization (optional, gated on secrets):
#   If APPLE_DEV_ID_P12_BASE64 + APPLE_DEV_ID_P12_PASSWORD + APPLE_ID +
#   APPLE_APP_SPECIFIC_PASSWORD + APPLE_TEAM_ID are all set in repo
#   secrets, the mac job imports the cert into a temporary keychain,
#   signs with Hardened Runtime + entitlements, and notarizes via
#   notarytool. The resulting .dmg is stamped with `signed=true` in the
#   bundled package.json so the renderer flips canAutoUpdate for mac
#   (seamless one-click update flow).
#
#   Without those secrets the workflow falls back to unsigned builds.
#   Mac users have to xattr -cr the bundle once after install; auto-
#   update falls back to "download + open dmg" via the v0.1.11 path.
#
# Windows + Linux are unsigned regardless — they don't need signing for
# self-update to work (NSIS / AppImage swap binaries without verification).
#
# IMPORTANT: scripts/build-bundles.js regenerates apps/os/src/
# cohort-surface.json from cohort-data/ before each dist step, so the
# packaged app always ships with the cohort surface as of the release tag.

on:
  push:
    tags:
      - 'v*'
  # Manual trigger for ad-hoc test builds (no release upload — pack only).
  workflow_dispatch:
    inputs:
      pack-only:
        description: "Skip publish; just build artifacts"
        type: boolean
        default: true

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  build:
    name: build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: install (workspaces)
        run: npm ci

      # NDI is macOS-only for now: @stagetimerio/grandiose is a native
      # (node-gyp) addon whose NDI SDK lib fails to cross-link on the
      # win/linux runners. Strip it on non-mac so electron-builder's native
      # rebuild has nothing to choke on; easel-ndi.js degrades to
      # "NDI unavailable" when the module is absent. (It's an optionalDependency.)
      - name: strip mac-only NDI module (${{ matrix.platform }})
        if: matrix.platform != 'mac'
        shell: bash
        run: rm -rf node_modules/@stagetimerio/grandiose apps/os/node_modules/@stagetimerio/grandiose

      - name: check OS packaging manifest
        run: npm run check:packaging --workspace @shape-rotator/os

      # Pull the bundled swf-node binary from the latest upstream release
      # (dmarzzz/searxng-wth-frnds). The asset lands at
      # apps/os/build-resources/swf-node/<binary> so electron-builder's
      # `extraResources` step (configured per-platform in
      # apps/os/package.json) copies it into Resources/swf-node/ in
      # the produced bundle.
      #
      # Per-platform asset filename (mirrors the upstream naming
      # convention, where Windows is the only asset with an extension):
      #   mac      → swf-node
      #   linux    → swf-node
      #   windows  → swf-node.exe
      #
      # Windows-arm64 has no upstream asset (no pyrage Windows arm64
      # wheel); the fetch script creates an empty build-resources/swf-node/
      # dir and exits 0, so the arm64 NSIS installer still builds and the
      # Electron supervisor flips to "unsupported" at first launch.
      #
      # The script falls back to a stub binary on mac/linux if no matching
      # upstream asset exists yet. The Windows path doesn't install a stub
      # (a bash heredoc can't execute as `.exe`); on missing assets it just
      # leaves the dir empty and the supervisor degrades the same way.
      - name: fetch bundled swf-node binary
        shell: bash
        env:
          # SWF_NODE_VERSION (set per-tag-build by the user) pins the
          # downloaded artifact to a specific upstream release. Leave
          # unset to follow `latest`.
          SWF_NODE_VERSION: ${{ vars.SWF_NODE_VERSION }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/fetch-swf-node.sh

      - name: regenerate cohort-surface.json from cohort-data/
        run: npm run build:cohort

      # ── macOS signing prep (gated) ──────────────────────────────
      # Only runs when ALL five signing secrets are present. Decodes
      # the .p12 cert to a temp file and EXPORTS the CSC_/APPLE_ env
      # vars to $GITHUB_ENV so the build step inherits them. When
      # secrets are missing, we don't write anything — the vars stay
      # unset, and the build step exports CSC_IDENTITY_AUTO_DISCOVERY=
      # false so electron-builder produces an unsigned bundle.
      #
      # Critical: we must NOT pass empty-string env vars to electron-
      # builder. An empty CSC_LINK makes it treat "" as a file path and
      # fail with "not a file". Either set real values or leave unset.
      - name: prepare macOS signing
        id: mac-sign-prep
        if: matrix.platform == 'mac'
        shell: bash
        run: |
          if [ -z "${{ secrets.APPLE_DEV_ID_P12_BASE64 }}" ] \
             || [ -z "${{ secrets.APPLE_DEV_ID_P12_PASSWORD }}" ] \
             || [ -z "${{ secrets.APPLE_ID }}" ] \
             || [ -z "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" ] \
             || [ -z "${{ secrets.APPLE_TEAM_ID }}" ]; then
            echo "macos_sign=0" >> "$GITHUB_OUTPUT"
            echo "::notice::macOS build will be UNSIGNED (one or more APPLE_* secrets missing)"
          else
            CERT_PATH="$RUNNER_TEMP/apple-dev-id.p12"
            echo -n "${{ secrets.APPLE_DEV_ID_P12_BASE64 }}" | base64 --decode > "$CERT_PATH"
            echo "macos_sign=1" >> "$GITHUB_OUTPUT"
            # Export to subsequent steps via GITHUB_ENV (only effective
            # when signing is wanted; otherwise we leave them unset).
            {
              echo "CSC_LINK=$CERT_PATH"
              echo "CSC_KEY_PASSWORD=${{ secrets.APPLE_DEV_ID_P12_PASSWORD }}"
              echo "APPLE_ID=${{ secrets.APPLE_ID }}"
              echo "APPLE_APP_SPECIFIC_PASSWORD=${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}"
              echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}"
            } >> "$GITHUB_ENV"
            echo "::notice::macOS build will be SIGNED + NOTARIZED"
          fi

      - name: build (${{ matrix.platform }})
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.platform }}" = "mac" ] && [ "${{ steps.mac-sign-prep.outputs.macos_sign }}" = "1" ]; then
            echo "→ macOS build: SIGNED + NOTARIZED"
            npm run dist:mac --workspace @shape-rotator/os -- \
              --config.mac.notarize=true \
              --config.extraMetadata.signed=true
          elif [ "${{ matrix.platform }}" = "mac" ]; then
            echo "→ macOS build: UNSIGNED"
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            npm run dist:mac --workspace @shape-rotator/os
          else
            npm run dist:${{ matrix.platform }} --workspace @shape-rotator/os
          fi
        env:
          # electron-builder uses GH_TOKEN to upload artifacts to the
          # release matching the pushed tag.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Skip publish when triggered manually with pack-only=true.
          # Tag-triggered builds always publish.
          EB_PUBLISH: ${{ github.event_name == 'workflow_dispatch' && inputs.pack-only && 'never' || 'onTagOrDraft' }}
          # CSC_LINK / CSC_KEY_PASSWORD / APPLE_* come in via
          # $GITHUB_ENV from the prep step when signing is enabled.
          # They are NOT set here so they stay unset on the unsigned
          # path (electron-builder distinguishes "unset" from "empty").

      - name: upload artifacts (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: Shape Rotator OS-${{ matrix.platform }}
          path: |
            apps/os/dist/*.dmg
            apps/os/dist/*.exe
            apps/os/dist/*.AppImage
            apps/os/dist/*.deb
            apps/os/dist/*.zip
          if-no-files-found: ignore
          retention-days: 14
